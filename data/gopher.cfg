# GOPHER.CFG - configuration for the Sprinter gopher browser.
# Place it next to GOPHER.EXE. Lines starting with # or ; are comments.

[settings]
# Launch the associated program without asking for confirmation.
# 1/yes/true = skip the prompt; anything else (or absent) = ask first.
skip_ask_for_exec = 0

[viewers]
# Associate a downloaded file's extension with a program to open it.
#   ext = program [args]
# %file% is replaced with the absolute path of the saved file.
# The program path may be absolute or relative to the EXE directory.
txt = C:\UTILS\FVIEW\FVIEW.EXE %file%
scr = C:\BIN\ZXVIEW.EXE %file%
pt3 = C:\BIN\PT3PLAY.EXE %file%
